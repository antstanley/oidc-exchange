name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check --all
      - run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace

  nodejs-test:
    name: Node.js Binding Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install -g @napi-rs/cli
      - name: Install dependencies
        working-directory: bindings/nodejs
        run: pnpm install
      - name: Lint
        working-directory: bindings/nodejs
        run: pnpm lint
      - name: Check formatting
        working-directory: bindings/nodejs
        run: pnpm fmt:check
      - name: Build native module
        working-directory: bindings/nodejs
        run: napi build --release
      - name: Run tests
        working-directory: bindings/nodejs
        run: pnpm test
      - name: Install Lambda adapter dependencies
        working-directory: bindings/lambda
        run: pnpm install
      - name: Lint Lambda adapter
        working-directory: bindings/lambda
        run: pnpm lint
      - name: Check Lambda adapter formatting
        working-directory: bindings/lambda
        run: pnpm fmt:check
      - name: Build Lambda adapter
        working-directory: bindings/lambda
        run: pnpm build
      - name: Test Lambda adapter
        working-directory: bindings/lambda
        run: pnpm test

  python-test:
    name: Python Binding Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        working-directory: bindings/python
        run: uv sync
      - name: Lint
        working-directory: bindings/python
        run: uv run ruff check .
      - name: Check formatting
        working-directory: bindings/python
        run: uv run ruff format --check .
      - name: Build Python module
        working-directory: bindings/python
        run: uv run maturin develop
      - name: Run tests
        working-directory: bindings/python
        run: uv run pytest tests/
