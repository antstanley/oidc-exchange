services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: oidc_exchange
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: oidc_exchange
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oidc_exchange"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
