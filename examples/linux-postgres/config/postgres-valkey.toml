[server]
host = "127.0.0.1"
port = 8080
issuer = "http://localhost:8080"

[key_manager]
adapter = "local"

[key_manager.local]
private_key_path = "./keys/signing-key.pem"
algorithm = "EdDSA"
kid = "dev-1"

[repository]
adapter = "postgres"

[repository.postgres]
url = "postgres://oidc_exchange:localdev@localhost:5432/oidc_exchange"
max_connections = 5

[session_repository]
adapter = "valkey"

[session_repository.valkey]
url = "redis://localhost:6379"
key_prefix = "oidc:"

[audit]
adapter = "noop"

[providers.google]
adapter = "oidc"
issuer = "https://accounts.google.com"
client_id = "${GOOGLE_CLIENT_ID}"
client_secret = "${GOOGLE_CLIENT_SECRET}"
scopes = ["openid", "email", "profile"]
