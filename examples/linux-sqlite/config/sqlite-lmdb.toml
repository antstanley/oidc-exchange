[server]
host = "127.0.0.1"
port = 8080
issuer = "http://localhost:8080"

[key_manager]
adapter = "local"

[key_manager.local]
private_key_path = "./keys/signing-key.pem"
algorithm = "EdDSA"
kid = "dev-1"

[repository]
adapter = "sqlite"

[repository.sqlite]
path = "./data/oidc-exchange.db"

[session_repository]
adapter = "lmdb"

[session_repository.lmdb]
path = "./lmdb"
max_size_mb = 64

[audit]
adapter = "noop"

[providers.google]
adapter = "oidc"
issuer = "https://accounts.google.com"
client_id = "${GOOGLE_CLIENT_ID}"
client_secret = "${GOOGLE_CLIENT_SECRET}"
scopes = ["openid", "email", "profile"]
