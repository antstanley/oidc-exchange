apiVersion: v1
kind: Secret
metadata:
  name: oidc-exchange-config
  namespace: oidc-exchange
type: Opaque
data:
  # Replace with base64-encoded values: echo -n 'value' | base64
  google-client-id: cGxhY2Vob2xkZXI=
  google-client-secret: cGxhY2Vob2xkZXI=
---
apiVersion: v1
kind: Secret
metadata:
  name: oidc-exchange-signing-key
  namespace: oidc-exchange
type: Opaque
data:
  # Replace with: cat signing-key.pem | base64 -w0
  signing-key.pem: ""
