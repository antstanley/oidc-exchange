[server]
host = "0.0.0.0"
port = 8080
issuer = "https://auth.example.com"

[repository]
adapter = "sqlite"

[repository.sqlite]
path = "./data/oidc-exchange.db"

[key_manager]
adapter = "local"

[key_manager.local]
private_key_path = "./keys/signing.pem"
algorithm = "EdDSA"
kid = "key-1"

[registration]
mode = "open"

[token]
access_token_ttl = "15m"
refresh_token_ttl = "30d"

[audit]
adapter = "noop"
blocking_threshold = "warning"

[telemetry]
enabled = false
exporter = "none"
